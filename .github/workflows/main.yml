name: Dev-VPS-Supergod

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  vps-session:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: "1. Preparar Entorno y Liberar Espacio (+30GB)"
        uses: actions/checkout@v4
        
      - name: "2. Maximizar Almacenamiento"
        run: |
          echo "🧹 Limpiando herramientas innecesarias de GitHub para darte mas espacio..."
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/powershell /usr/share/swift
          sudo apt-get clean
          df -h /

      - name: "3. Recuperar Carpeta SRV (Cache Comprimido ZSTD)"
        uses: actions/cache/restore@v4
        with:
          path: SRV
          key: srv-storage-${{ github.run_id }}
          restore-keys: |
            srv-storage-

      - name: "4. Instalar y Configurar Tailscale (Solo para SSH seguro)"
        run: |
          echo "🚀 Instalando Tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=tskey-auth-kj81yXmYdu11CNTRL-mT422M3PiwZJCr1uofDiwZSa8mhNoSny --hostname=vps-dev --accept-dns=false
          
          TS_IP=$(sudo tailscale ip -4)
          echo $TS_IP > tailscale_ip.txt

      - name: "5. Instalar VS Code Server, Tmux y Cloudflared"
        run: |
          echo "🚀 Instalando dependencias..."
          curl -fsSL https://code-server.dev/install.sh | sh
          sudo apt-get update && sudo apt-get install -y tmux
          
          echo "🚀 Instalando Cloudflare Tunnel..."
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: "6. Configurar Sistema de Consola y Subprocesos (P)"
        run: |
          echo '#!/bin/bash' | sudo tee /usr/bin/consola
          echo 'tmux attach-session -t VPS' | sudo tee -a /usr/bin/consola
          sudo chmod +x /usr/bin/consola

          echo '#!/bin/bash' | sudo tee /usr/bin/P
          echo 'tmux new-window -t VPS -n "App-${RANDOM:0:3}" "$*; read -p \"Presiona Enter para cerrar...\""' | sudo tee -a /usr/bin/P
          echo 'echo "✅ Proceso lanzado. Escribe '\''consola'\'' para verlo (Cambia de pestaña con Ctrl+b y luego las flechas)."' | sudo tee -a /usr/bin/P
          sudo chmod +x /usr/bin/P

          mkdir -p SRV
          if [ ! -f "SRV/start.sh" ]; then
            cat << 'EOF' > SRV/start.sh
#!/bin/bash
echo "=== INICIO PRINCIPAL ==="
echo "Este script corre automaticamente al encender."
echo "Puedes modificarlo desde VS Code."
echo "Procesos activos manteniendose vivos..."
sleep infinity
EOF
            chmod +x SRV/start.sh
          fi

      - name: "7. Iniciar Servicios en Segundo Plano (Tmux)"
        env:
          CF_TOKEN: ${{ secrets.CF_TOKEN }}
        run: |
          echo "🚀 Arrancando entorno seguro..."
          tmux new-session -d -s VPS -n "VSCode" "PASSWORD=runnerpass code-server --bind-addr 0.0.0.0:8080 /home/runner/SRV"
          
          if [ -n "$CF_TOKEN" ]; then
            tmux new-window -t VPS -n "Tunel-Web" "cloudflared tunnel --no-autoupdate run --token $CF_TOKEN"
          else
            tmux new-window -t VPS -n "Tunel-Web" "echo '❌ Falta el CF_TOKEN en GitHub Secrets. Anadelo para usar tu dominio vs.mcpe.qzz.io'; sleep infinity"
          fi
          
          tmux new-window -t VPS -n "MainStart" "cd /home/runner/SRV && ./start.sh"
          tmux select-window -t VPS:2

      - name: "8. Configurar SSH Directo"
        run: |
          echo "runner:runnerpass" | sudo chpasswd
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
          sudo systemctl restart ssh

      - name: "9. Ejecucion Principal y Datos de Acceso"
        run: |
          TS_IP=$(cat tailscale_ip.txt)
          echo "--------------------------------------------------------------------"
          echo "🚀 ENTORNO SUPERGOD ACTIVO 🚀"
          echo "--------------------------------------------------------------------"
          echo "🌐 VS CODE SERVER (ACCESO PUBLICO MUNDIAL):"
          echo "   Ve a tu navegador sin VPN y entra a:"
          echo "   👉 http://vs.mcpe.qzz.io"
          echo "   Contrasena: runnerpass"
          echo "--------------------------------------------------------------------"
          echo "💻 ACCESO SSH (Via Tailscale):"
          echo "   ssh runner@vps-dev"
          echo "   Contrasena: runnerpass"
          echo "--------------------------------------------------------------------"
          echo "🛠️  COMANDOS MAGICOS (Usalos en SSH):"
          echo "   👉 consola  -> Abre la terminal para ver start.sh y el Tunel web."
          echo "                 (Para salir sin apagarlo presiona: Ctrl+B y luego la tecla D)."
          echo "   👉 P        -> Lanza cualquier bot. Ej: P python3 bot.py"
          echo "--------------------------------------------------------------------"
          
          echo "⏳ Servidor activo por 5h 45m..."
          sleep 20700

      - name: "10. APAGADO SEGURO"
        if: always()
        run: |
          echo "🛑 INICIANDO APAGADO..."
          sudo tailscale logout || true
          sleep 5

      - name: "11. Guardar Cache (Tus archivos comprimidos en ZSTD)"
        if: always()
        uses: actions/cache/save@v4
        with:
          path: SRV
          key: srv-storage-${{ github.run_id }}

      - name: "12. Bucle de Reinicio Automatico"
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 Invocando nueva maquina (Todo se mantendra intacto)..."
          gh workflow run "main.yml" --ref main || gh workflow run "VPN.yml" --ref main
